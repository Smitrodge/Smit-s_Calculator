<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator-body">
        <input type="text" placeholder="0" id="input">
        <div class="section1">
            <button class="specialbtn">AC</button>
            <button class="specialbtn">%</button>
            <button class="specialbtn">DL</button>
            <button class="specialbtn">/</button>
        </div>
        <div class="section2">
            <button class="numBtn" id="7">7</button>
            <button class="numBtn" id="8">8</button>
            <button class="numBtn" id="9">9</button>
            <button class="specialbtn">*</button>
        </div>
        <div class="section3">
            <button class="numBtn" id="4">4</button>
            <button class="numBtn" id="5">5</button>
            <button class="numBtn" id="6">6</button>
            <button class="specialbtn">-</button>
        </div>
        <div class="section4">
            <button class="numBtn" id="1">1</button>
            <button class="numBtn" id="2">2</button>
            <button class="numBtn" id="3">3</button>
            <button class="specialbtn">+</button>
        </div>
        <div class="section5">
            <button class="numBtn" id="0">0</button>
            <button>.</button>
            <button id="equal">=</button>
        </div>
    </div>
    <script src="logic.js"></script>
</body>

</html>
